name: Build Test

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type'
        default: 'standard'
        required: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Configure test environment
      run: |
        RDP_PORT=$((4000 + RANDOM % 5000))
        echo "RDP_PORT=$RDP_PORT" >> $GITHUB_ENV
        echo "BUILD_ID=$(date +%s | sha256sum | head -c8)" >> $GITHUB_ENV
        echo "TEST_USER=NICKY" >> $GITHUB_ENV
        echo "TEST_PASS=NICKY070709" >> $GITHUB_ENV

    - name: Create test container
      run: |
        mkdir -p .docker/test-runner

        cat > .docker/test-runner/docker-compose.yml <<EOF
        version: '3.8'
        services:
          test-runner:
            image: dockurr/windows
            container_name: test-${GITHUB_RUN_ID}
            environment:
              VERSION: "11"
              USERNAME: "${TEST_USER}"
              PASSWORD: "${TEST_PASS}"
              RAM_SIZE: "6G"
              CPU_CORES: "2"
              DISK_SIZE: "64G"
            devices:
              - /dev/kvm
              - /dev/net/tun
            cap_add:
              - NET_ADMIN
            ports:
              - "${RDP_PORT}:3389/tcp"
              - "${RDP_PORT}:3389/udp"
              - "8006:8006"
            volumes:
              - ../../test-results:/storage
            restart: "no"
        EOF

    - name: Start Windows container
      run: |
        cd .docker/test-runner
        sudo docker compose up -d

        echo "Container started:"
        sudo docker ps

        echo "Waiting VM boot..."
        sleep 60

    - name: Install Tailscale
      env:
        TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
      run: |
        curl -fsSL https://tailscale.com/install.sh | sh

        sudo nohup tailscaled > /tmp/tailscaled.log 2>&1 &
        sleep 5

        sudo tailscale up \
          --authkey="$TS_AUTHKEY" \
          --hostname="gh-node-$(openssl rand -hex 3)"

        TS_IP=$(tailscale ip -4 | head -n1)

        echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

        echo "================================"
        echo "TAILSCALE CONNECTED"
        echo "IP: $TS_IP"
        echo "================================"

    - name: Setup SSH access
      run: |
        sudo apt update
        sudo apt install -y openssh-server

        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        
        sudo useradd -m -s /bin/bash NICKY || true

        echo "NICKY:NICKY070709" | sudo chpasswd
    
        sudo usermod -aG sudo NICKY

        sudo systemctl enable ssh
        sudo systemctl restart ssh

        echo "==============================="
        echo "SSH ACCESS"
        echo "User: NICKY"
        echo "Pass: NICKY070709"
        echo "IP: $TAILSCALE_IP"
        echo "Port: 22"
        echo "==============================="

    - name: Environment info
      run: |
        echo "==========================================="
        echo "WINDOWS RDP"
        echo "User: NICKY"
        echo "Pass: NICKY070709"
        echo ""
        echo "RDP: $TAILSCALE_IP:$RDP_PORT"
        echo "Web UI: http://$TAILSCALE_IP:8006"
        echo ""
        echo "SSH:"
        echo "ssh ubuntu@$TAILSCALE_IP"
        echo "password: NICKY"
        echo "==========================================="

        sudo docker ps

        echo "Runner active..."
        sleep 14400

    - name: Cleanup
      if: always()
      run: |
        cd .docker/test-runner 2>/dev/null && sudo docker compose down -v || true

        sudo docker system prune -f --volumes || true

        sudo tailscale logout || true
        sudo pkill tailscaled || true
