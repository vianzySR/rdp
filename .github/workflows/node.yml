name: Kali QEMU Tailscale

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kali:
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl net-tools

      - name: Install Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

          sudo systemctl enable --now tailscaled
          sleep 5

          sudo tailscale up \
            --authkey="$TS_AUTHKEY" \
            --hostname="kali-qemu-${GITHUB_RUN_ID}" \
            --accept-routes

          TS_IP=$(tailscale ip -4 | head -n1)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

          echo "Tailscale IP: $TS_IP"

      - name: Create compose file
        run: |
          mkdir -p qemu

          if [ -e /dev/kvm ]; then
            KVM_LINE="- /dev/kvm"
          else
            KVM_LINE=""
          fi

          cat > docker-compose.yml <<EOF
          services:
            qemu:
              image: qemux/qemu
              container_name: qemu
              network_mode: host
              environment:
                BOOT: "kali"
                RAM_SIZE: "4G"
                CPU_CORES: "2"
                DISK_SIZE: "32G"
              devices:
                ${KVM_LINE}
                - /dev/net/tun
              cap_add:
                - NET_ADMIN
              volumes:
                - ./qemu:/storage
              restart: "no"
              stop_grace_period: 2m
          EOF

          cat docker-compose.yml

      - name: Start Kali QEMU
        run: |
          sudo docker compose up -d
          sudo docker ps -a

      - name: Wait for Web UI
        run: |
          echo "Waiting for port 8006..."

          for i in {1..120}; do
            if curl -s http://127.0.0.1:8006 >/dev/null; then
              echo "Web UI ready"
              break
            fi

            echo "Waiting $i..."
            sudo docker ps -a
            sudo docker logs qemu --tail 30 || true
            sleep 5
          done

          echo "Listening ports:"
          sudo netstat -tulpn | grep 8006 || true

          echo "Local test:"
          curl -I http://127.0.0.1:8006 || true

          echo "Tailnet test:"
          curl -I http://$TAILSCALE_IP:8006 || true

      - name: Access info
        run: |
          echo "================================"
          echo "OPEN:"
          echo "http://$TAILSCALE_IP:8006"
          echo ""
          echo "If browser still refused, check logs above."
          echo "================================"

          sleep 14400

      - name: Cleanup
        if: always()
        run: |
          sudo docker compose down -v || true
          sudo docker rm -f qemu || true
          sudo docker system prune -f --volumes || true
          sudo tailscale logout || true
