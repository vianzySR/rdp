name: Android VNC Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-vnc:
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install desktop, VNC, noVNC, Android tools
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies tigervnc-standalone-server novnc websockify android-sdk

      - name: Install Tailscale
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo nohup tailscaled > /tmp/tailscaled.log 2>&1 &
          sleep 5
          sudo tailscale up --authkey="$TS_AUTHKEY" --hostname="android-vnc-${GITHUB_RUN_ID}"
          echo "TAILSCALE_IP=$(tailscale ip -4 | head -n1)" >> $GITHUB_ENV

      - name: Start VNC desktop
        run: |
          mkdir -p ~/.vnc
          echo "NICKY070709" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          cat > ~/.vnc/xstartup <<EOF
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          startxfce4 &
          EOF
          chmod +x ~/.vnc/xstartup

          vncserver :1 -geometry 1280x720 -depth 24
          websockify --web=/usr/share/novnc/ 6080 localhost:5901 > /tmp/novnc.log 2>&1 &

      - name: Setup Android SDK Emulator
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "emulator" "platforms;android-35" "system-images;android-35;google_apis;x86_64"

          echo "no" | avdmanager create avd \
            -n test_android \
            -k "system-images;android-35;google_apis;x86_64" \
            --device "pixel_6"

      - name: Start Android Emulator GUI
        run: |
          export DISPLAY=:1
          emulator -avd test_android \
            -gpu swiftshader_indirect \
            -no-audio \
            -no-boot-anim \
            -netdelay none \
            -netspeed full > /tmp/emulator.log 2>&1 &

          adb wait-for-device
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Install and run APK
        run: |
          adb devices

          # taruh APK kamu di repo dengan nama app.apk
          adb install -r app.apk

          # ganti com.example.app dengan package app kamu
          adb shell monkey -p com.example.app -c android.intent.category.LAUNCHER 1

      - name: Access info
        run: |
          echo "===================================="
          echo "Android VNC aktif"
          echo ""
          echo "noVNC:"
          echo "http://$TAILSCALE_IP:6080/vnc.html"
          echo ""
          echo "VNC:"
          echo "$TAILSCALE_IP:5901"
          echo "Password: NICKY070709"
          echo ""
          echo "ADB:"
          adb devices
          echo "===================================="

          sleep 14400

      - name: Cleanup
        if: always()
        run: |
          vncserver -kill :1 || true
          adb emu kill || true
          sudo tailscale logout || true
          sudo pkill tailscaled || true
